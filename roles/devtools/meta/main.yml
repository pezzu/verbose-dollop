galaxy_info:
  author: Peter Sukhenko
  description: >
    Install container runtimes — Docker CE and Podman
    with optional Docker-compatible bindings. Includes rustup,
    the Rust toolchain installer, Go, the Go programming language toolchain,
    nvm, the Node.js version manager, gh, the GitHub CLI with the
    gh-act extension for running GitHub Actions locally, opencode and pi,
    AI coding agents for the terminal, uv,
    an extremely fast Python package and project manager, fabric,
    an open-source framework for augmenting humans using AI, and droast,
    an opinionated Dockerfile linter.
