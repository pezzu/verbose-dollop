---
- name: Add immanuwell droast Homebrew tap
  community.general.homebrew_tap:
    name: immanuwell/droast
    url: https://github.com/immanuwell/homebrew-droast.git
    state: present
    path: >-
      /home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}

- name: Install droast via Homebrew
  community.general.homebrew:
    name: immanuwell/droast/droast
    state: present
    path: >-
      /home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}
