---
- name: Install Packages
  block:
    - name: Apt packages
      become: true
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      loop: "{{ system_packages }}"
      when: ansible_facts['os_family'] == 'Debian'

    - name: Create compatibility link
      become: false
      ansible.builtin.file:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        state: link
        force: false
      loop:
        - src: "{{ lookup('pipe', 'which fdfind') }}"
          dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/fd"
        - src: "{{ lookup('pipe', 'which batcat') }}"
          dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/bat"
      ignore_errors: false
