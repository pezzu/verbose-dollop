---
- name: Install aws cli
  community.general.homebrew:
    name: awscli
    state: present
    path: "/home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts[\"env\"][\"PATH\"] }}"

- name: Install azure cli
  community.general.homebrew:
    name: azure-cli
    state: present
    path: "/home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts[\"env\"][\"PATH\"] }}"

- name: Install oci cli
  community.general.homebrew:
    name: oci-cli
    state: present
    path: "/home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts[\"env\"][\"PATH\"] }}"
