---
- name: Add janosmiko Homebrew tap
  community.general.homebrew_tap:
    name: janosmiko/tap
    state: present
    path: >-
      /home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}

- name: Install Kubernetes packages
  community.general.homebrew:
    name:
      - kubectl
      - minikube
      - helm
      - kubectx
      - k9s
      - janosmiko/tap/lfk
    state: present
    path: "/home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"
